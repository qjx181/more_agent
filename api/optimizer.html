<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目三 · 持续优化引擎</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#020617;color:#e2e8f0;min-height:100vh;padding:1.5rem}
.container{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 320px;gap:1.5rem}

.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #1e293b}
.header h1{font-size:1.25rem;font-weight:700}
.header h1 span{color:#34d399}
.header .sub{color:#64748b;font-size:0.75rem}

.main-panel{display:flex;flex-direction:column;gap:1rem}

.card{background:rgba(15,23,42,0.6);border:1px solid #1e293b;border-radius:0.75rem;padding:1.25rem}
.card-title{font-size:0.8rem;font-weight:600;color:#94a3b8;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.05em}

.path-row{display:flex;gap:0.5rem}
.path-row input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:0.5rem;padding:0.6rem 0.8rem;color:#e2e8f0;font-family:inherit;font-size:0.8rem;outline:none;transition:border-color 0.2s}
.path-row input:focus{border-color:#22d3ee}
.path-row input::placeholder{color:#475569}

.dim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem}
.dim-item{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.6rem;background:rgba(30,41,59,0.4);border-radius:0.4rem;cursor:pointer;transition:all 0.2s;font-size:0.78rem;border:1px solid transparent}
.dim-item:hover{border-color:#334155;background:rgba(30,41,59,0.6)}
.dim-item.selected{border-color:#22d3ee;background:rgba(8,51,68,0.4)}
.dim-item input{display:none}
.dim-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dim-label{flex:1}
.dim-check{color:#22d3ee;font-size:0.7rem;opacity:0;transition:opacity 0.2s}
.dim-item.selected .dim-check{opacity:1}

.action-row{display:flex;gap:0.5rem}
.btn{flex:1;padding:0.65rem 1rem;border:none;border-radius:0.5rem;font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-scan{background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff}
.btn-scan:hover:not(:disabled){box-shadow:0 0 20px rgba(6,182,212,0.3)}
.btn-fix{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-fix:hover:not(:disabled){box-shadow:0 0 20px rgba(16,185,129,0.3)}
.btn-auto{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.btn-auto:hover:not(:disabled){box-shadow:0 0 20px rgba(167,139,250,0.3)}
.btn-stop{background:linear-gradient(135deg,#be123c,#e11d48);color:#fff}
.btn-clear{background:#1e293b;color:#94a3b8;flex:0 0 auto;padding:0.65rem 1.2rem}

/* auto mode progress panel */
.auto-panel{display:none}
.auto-panel.visible{display:flex;flex-direction:column;gap:0.75rem}
.auto-status-bar{display:flex;align-items:center;gap:1rem;padding:0.75rem;background:rgba(30,41,59,0.4);border-radius:0.5rem}
.auto-pulse{width:10px;height:10px;border-radius:50%;flex-shrink:0;animation:pulse 1.2s infinite}
.auto-pulse.running{background:#a78bfa}
.auto-pulse.completed{background:#34d399;animation:none}
.auto-pulse.failed{background:#fb7185;animation:none}
.auto-phase{font-size:0.8rem;font-weight:600}
.auto-msg{font-size:0.7rem;color:#94a3b8}
.auto-round{font-size:0.75rem;color:#64748b;margin-left:auto}

/* score trend mini chart */
.score-trend{display:flex;align-items:flex-end;gap:3px;height:60px;padding:0.5rem 0}
.trend-bar{width:20px;border-radius:3px 3px 0 0;transition:height 0.5s;min-height:4px;position:relative}
.trend-bar .bar-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:0.55rem;color:#475569;white-space:nowrap}
.trend-bar .bar-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:0.55rem;color:#94a3b8}

/* auto dim scores in progress */
.auto-dims{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem}
.auto-dim-item{display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;padding:0.3rem 0.4rem;background:rgba(30,41,59,0.2);border-radius:0.3rem}
.auto-dim-score{font-weight:600;margin-left:auto}

.results-area{display:none}
.results-area.visible{display:flex;flex-direction:column;gap:1rem}

.score-row{display:flex;gap:1rem}
.score-gauge{flex:0 0 160px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(30,41,59,0.3);border-radius:0.75rem;padding:1rem}
.score-number{font-size:2.5rem;font-weight:700;line-height:1}
.score-number.good{color:#34d399}
.score-number.ok{color:#fbbf24}
.score-number.bad{color:#fb7185}
.score-label{font-size:0.65rem;color:#64748b;margin-top:0.4rem}
.score-dims{flex:1;display:flex;flex-direction:column;gap:0.35rem}
.dim-bar-row{display:flex;align-items:center;gap:0.5rem;font-size:0.7rem}
.dim-bar-label{width:60px;text-align:right;color:#94a3b8;flex-shrink:0}
.dim-bar-track{flex:1;height:14px;background:#1e293b;border-radius:7px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:7px;transition:width 0.8s ease}
.dim-bar-score{width:30px;text-align:right;color:#64748b;flex-shrink:0;font-size:0.65rem}

.issues-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem}
.issues-tabs{display:flex;gap:0.5rem}
.issues-tab{padding:0.25rem 0.6rem;border-radius:0.3rem;font-size:0.7rem;cursor:pointer;color:#64748b;background:transparent;border:1px solid transparent;font-family:inherit;transition:all 0.2s}
.issues-tab:hover{color:#e2e8f0;border-color:#334155}
.issues-tab.active{background:#1e293b;color:#e2e8f0;border-color:#334155}
.issues-list{display:flex;flex-direction:column;gap:0.3rem;max-height:300px;overflow-y:auto}
.issue-item{padding:0.5rem 0.7rem;background:rgba(30,41,59,0.3);border-radius:0.4rem;font-size:0.75rem;border-left:3px solid transparent;cursor:pointer;transition:background 0.2s}
.issue-item:hover{background:rgba(30,41,59,0.6)}
.issue-item.critical{border-left-color:#fb7185}
.issue-item.high{border-left-color:#fbbf24}
.issue-item.medium{border-left-color:#22d3ee}
.issue-item.low{border-left-color:#475569}
.issue-item .issue-line1{display:flex;justify-content:space-between;align-items:center}
.issue-item .issue-type{color:#94a3b8;font-size:0.65rem}
.issue-item .issue-detail{display:none;margin-top:0.4rem;padding-top:0.4rem;border-top:1px solid #1e293b;color:#94a3b8;font-size:0.7rem;line-height:1.5}
.issue-item.expanded .issue-detail{display:block}
.issue-badge{display:inline-block;padding:0.1rem 0.35rem;border-radius:0.2rem;font-size:0.6rem;font-weight:600}
.badge-critical{background:rgba(251,113,133,0.2);color:#fb7185}
.badge-high{background:rgba(251,191,36,0.2);color:#fbbf24}
.badge-medium{background:rgba(34,211,238,0.2);color:#22d3ee}
.badge-low{background:rgba(71,85,105,0.3);color:#94a3b8}
.empty-issues{color:#475569;font-size:0.75rem;text-align:center;padding:2rem}

.history-panel{display:flex;flex-direction:column;gap:0.5rem}
.history-list{display:flex;flex-direction:column;gap:0.35rem;overflow-y:auto;max-height:calc(100vh - 200px)}
.history-item{padding:0.6rem 0.8rem;background:rgba(30,41,59,0.3);border-radius:0.4rem;cursor:pointer;font-size:0.7rem;border:1px solid transparent;transition:all 0.2s}
.history-item:hover{border-color:#334155}
.history-item.active{border-color:#a78bfa}
.history-item .h-status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:0.4rem}
.h-status.completed{background:#34d399}
.h-status.failed{background:#fb7185}
.h-status.running{background:#a78bfa;animation:pulse 1s infinite}
.h-type{font-size:0.6rem;color:#475569;background:#1e293b;padding:0.1rem 0.3rem;border-radius:0.2rem;margin-left:0.3rem}
.h-item-path{color:#94a3b8;margin:0.2rem 0;word-break:break-all}
.h-item-score{color:#34d399;font-weight:600}
.h-item-time{color:#475569;font-size:0.6rem}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

@media(max-width:900px){.container{grid-template-columns:1fr}.history-panel{max-height:300px}.dim-grid,.auto-dims{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.dim-grid{grid-template-columns:1fr}.score-row{flex-direction:column}.score-gauge{flex:auto}.action-row{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h1>⚡ <span>项目三</span> · 持续优化引擎</h1>
      <div class="sub">自动扫描 → 修复 → 重扫 → 再优化 → 直到分数稳定</div>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <span id="api-status" style="width:8px;height:8px;border-radius:50%;background:#fbbf24;display:inline-block"></span>
      <span id="api-status-text" style="font-size:0.7rem;color:#64748b">检查中...</span>
    </div>
  </div>

  <div class="main-panel">

    <!-- input -->
    <div class="card">
      <div class="card-title">🎯 目标项目</div>
      <div class="path-row">
        <input id="target-path" type="text" placeholder="/mnt/c/Users/qjx/Desktop/github/项目二" value="/mnt/c/Users/qjx/Desktop/agent-自进化版/项目一cursor版本/在线部分">
        <button class="btn btn-clear" onclick="document.getElementById('target-path').value=''">✕</button>
      </div>
    </div>

    <!-- dimensions -->
    <div class="card">
      <div class="card-title">📐 优化维度 <span id="dim-count" style="color:#64748b;font-size:0.7rem;font-weight:400">(全选)</span></div>
      <div class="dim-grid" id="dim-grid"></div>
    </div>

    <!-- actions -->
    <div class="action-row">
      <button class="btn btn-scan" id="btn-scan" onclick="startOptimize(true)">🔍 仅扫描</button>
      <button class="btn btn-fix" id="btn-fix" onclick="startOptimize(false)">🛠️ 扫描+修复</button>
      <button class="btn btn-auto" id="btn-auto" onclick="startAutoOptimize()">♾️ 持续监控</button>
      <button class="btn btn-evolve" id="btn-evolve" onclick="startEvolution()" style="background:linear-gradient(135deg,#ea580c,#f97316);color:#fff">🧬 进化</button>
      <button class="btn btn-multi" id="btn-multi" onclick="startMultiAgent()" style="background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff">🚀 多Agent自进化</button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopAll()" disabled>⏹ 停止</button>
    </div>

    <!-- auto progress panel -->
    <div class="auto-panel card" id="auto-panel">
      <div class="card-title">🔄 持续优化进度 <span id="auto-round-label" style="font-weight:400;color:#64748b">等待启动</span></div>

      <div class="auto-status-bar" id="auto-status-bar">
        <div class="auto-pulse running" id="auto-pulse"></div>
        <div>
          <div class="auto-phase" id="auto-phase">初始化中...</div>
          <div class="auto-msg" id="auto-msg">准备启动持续优化循环</div>
        </div>
        <div class="auto-round" id="auto-round-num">轮 0/15</div>
      </div>

      <!-- score trend chart -->
      <div>
        <div style="font-size:0.65rem;color:#64748b;margin-bottom:0.3rem">📈 评分趋势</div>
        <div class="score-trend" id="score-trend"></div>
      </div>

      <!-- dimension scores -->
      <div>
        <div style="font-size:0.65rem;color:#64748b;margin-bottom:0.3rem">📐 各维度分数</div>
        <div class="auto-dims" id="auto-dims"></div>
      </div>

      <!-- current round stats -->
      <div class="score-row" id="auto-stats" style="display:none">
        <div class="score-gauge" style="flex:auto;flex-direction:row;gap:1.5rem;padding:0.6rem 1rem">
          <div><div style="font-size:1.2rem;font-weight:700;color:#34d399" id="auto-cur-score">--</div><div style="font-size:0.6rem;color:#64748b">当前评分</div></div>
          <div><div style="font-size:1.2rem;font-weight:700;color:#fb7185" id="auto-critical">--</div><div style="font-size:0.6rem;color:#64748b">Critical</div></div>
          <div><div style="font-size:1.2rem;font-weight:700;color:#fbbf24" id="auto-total">--</div><div style="font-size:0.6rem;color:#64748b">问题总数</div></div>
          <div><div style="font-size:1.2rem;font-weight:700;color:#a78bfa" id="auto-fixed">--</div><div style="font-size:0.6rem;color:#64748b">本轮修复</div></div>
        </div>
      </div>
    </div>

    <!-- results -->
    <div class="results-area" id="results">
      <div class="card">
        <div class="card-title">📊 扫描结果</div>
        <div class="score-row">
          <div class="score-gauge">
            <div class="score-number" id="overall-score">--</div>
            <div class="score-label">综合评分 / 100</div>
          </div>
          <div class="score-dims" id="dim-bars"></div>
        </div>
      </div>

      <div class="card">
        <div class="issues-header">
          <div class="card-title" style="margin-bottom:0">🐛 发现的问题</div>
          <div class="issues-tabs">
            <button class="issues-tab active" data-filter="all" onclick="filterIssues('all',this)">全部</button>
            <button class="issues-tab" data-filter="critical" onclick="filterIssues('critical',this)">Critical</button>
            <button class="issues-tab" data-filter="high" onclick="filterIssues('high',this)">High</button>
            <button class="issues-tab" data-filter="medium" onclick="filterIssues('medium',this)">Medium</button>
            <button class="issues-tab" data-filter="low" onclick="filterIssues('low',this)">Low</button>
          </div>
        </div>
        <div class="issues-list" id="issues-list">
          <div class="empty-issues">还没有运行扫描</div>
        </div>
      </div>

      <div class="card" style="font-size:0.75rem;color:#94a3b8;line-height:1.6">
        <span id="result-summary">等待启动第一轮扫描...</span>
      </div>

      <!-- fix details -->
      <div class="card" id="fix-details" style="display:none">
        <div class="card-title">🔧 自动修复详情</div>
        <div class="issues-list" id="fix-list"></div>
      </div>
    </div>
  </div>

  <!-- history -->
  <div class="history-panel card">
    <div class="card-title">📜 运行历史</div>
    <div class="history-list" id="history-list">
      <div style="color:#475569;font-size:0.7rem;text-align:center;padding:1rem">暂无记录</div>
    </div>
    <button class="btn" style="background:#1e293b;color:#94a3b8;font-size:0.7rem;padding:0.4rem" onclick="loadHistory()">🔄 刷新</button>
  </div>

</div>

<script>
const API_BASE = window.location.origin;
const DIM_COLORS = {
  security:'#fb7185', performance:'#fb923c', asyncification:'#22d3ee',
  quality:'#34d399', testing:'#a78bfa', architecture:'#fbbf24',
  documentation:'#94a3b8', configuration:'#f472b6', deadcode:'#64748b'
};
const DIM_ICONS = {
  security:'🛡️', performance:'⚡', asyncification:'🔄',
  quality:'📝', testing:'🧪', architecture:'🏗️',
  documentation:'📖', configuration:'⚙️', deadcode:'🗑️'
};

let selectedDims = new Set();
let currentRunId = null;
let pollTimer = null;
let autoPollTimer = null;
let isAutoMode = false;

async function loadDimensions() {
  try {
    const res = await fetch('/api/optimize/dimensions');
    const data = await res.json();
    const grid = document.getElementById('dim-grid');
    grid.innerHTML = '';
    data.dimensions.forEach(d => {
      const div = document.createElement('div');
      div.className = 'dim-item selected';
      div.dataset.id = d.id;
      div.innerHTML = `
        <span class="dim-dot" style="background:${DIM_COLORS[d.id]||'#64748b'}"></span>
        <span class="dim-label">${DIM_ICONS[d.id]||''} ${d.name}</span>
        <span class="dim-check">✓</span>
      `;
      div.onclick = () => toggleDim(d.id, div);
      grid.appendChild(div);
      selectedDims.add(d.id);
    });
    updateDimCount();
  } catch(e) { console.error('加载维度失败:', e); }
}

function toggleDim(id, el) {
  if(selectedDims.has(id)) { selectedDims.delete(id); el.classList.remove('selected'); }
  else { selectedDims.add(id); el.classList.add('selected'); }
  updateDimCount();
}
function updateDimCount() {
  const total = document.querySelectorAll('.dim-item').length;
  document.getElementById('dim-count').textContent =
    selectedDims.size === total ? '(全选)' : `(${selectedDims.size}/${total})`;
}

async function checkApi() {
  try {
    const res = await fetch('/health');
    if(res.ok) {
      document.getElementById('api-status').style.background = '#34d399';
      document.getElementById('api-status-text').textContent = 'API 运行中';
      return true;
    }
  } catch(e) {}
  document.getElementById('api-status').style.background = '#fb7185';
  document.getElementById('api-status-text').textContent = 'API 未连接';
  return false;
}

// ═══ 单次扫描/修复 ═══

async function startOptimize(dryRun) {
  const target = getTarget();
  if(!target) return;
  isAutoMode = false;
  document.getElementById('auto-panel').classList.remove('visible');
  setButtonsDisabled(true);
  try {
    const res = await fetch('/api/optimize', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ target_dir: target, dimensions: [...selectedDims], dry_run: dryRun })
    });
    const data = await res.json();
    currentRunId = data.run_id;
    pollResult(currentRunId);
  } catch(e) { alert('启动失败: ' + e.message); setButtonsDisabled(false); }
}

function getTarget() {
  const t = document.getElementById('target-path').value.trim();
  if(!t) { alert('请输入目标项目路径'); return null; }
  return t;
}

function setButtonsDisabled(v) {
  document.getElementById('btn-scan').disabled = v;
  document.getElementById('btn-fix').disabled = v;
  document.getElementById('btn-auto').disabled = v;
  document.getElementById('btn-evolve').disabled = v;
  document.getElementById('btn-multi').disabled = v;
  document.getElementById('btn-stop').disabled = !v;
}

// ═══ 进化循环 ═══

async function startEvolution() {
  const target = getTarget();
  if(!target) return;
  isAutoMode = true;
  setButtonsDisabled(true);

  try {
    const res = await fetch('/api/optimize/evolve', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ target_dir: target, dimensions: [...selectedDims], max_fixes: 30 })
    });
    const data = await res.json();
    currentRunId = data.run_id;

    const panel = document.getElementById('auto-panel');
    panel.classList.add('visible');
    document.getElementById('results').classList.remove('visible');
    pollAutoProgress(currentRunId);
  } catch(e) { alert('启动失败: ' + e.message); setButtonsDisabled(false); }
}

function pollResult(runId) {
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/api/optimize/runs/${runId}`);
      const data = await res.json();
      if(data.status === 'completed' || data.status === 'failed') {
        clearInterval(pollTimer); pollTimer = null;
        setButtonsDisabled(false);
        displayResults(data);
        loadHistory();
      }
    } catch(e) {}
  }, 1500);
}

// ═══ 持续优化循环 ═══

async function startAutoOptimize() {
  const target = getTarget();
  if(!target) return;
  isAutoMode = true;
  setButtonsDisabled(true);

  try {
    const res = await fetch('/api/optimize/auto', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ target_dir: target, dimensions: [...selectedDims] })
    });
    const data = await res.json();
    currentRunId = data.run_id;

    // 显示实时进度面板
    const panel = document.getElementById('auto-panel');
    panel.classList.add('visible');
    document.getElementById('results').classList.remove('visible');

    // 开始轮询进度
    pollAutoProgress(currentRunId);
  } catch(e) { alert('启动失败: ' + e.message); setButtonsDisabled(false); }
}

function pollAutoProgress(runId) {
  if(autoPollTimer) clearInterval(autoPollTimer);
  autoPollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/api/optimize/auto/${runId}/progress`);
      const p = await res.json();
      updateAutoUI(p);

      if(p.status === 'completed' || p.status === 'failed') {
        clearInterval(autoPollTimer); autoPollTimer = null;
        setButtonsDisabled(false);

        // 显示最终结果
        if(p.status === 'completed') {
          document.getElementById('results').classList.add('visible');
          displayResults({
            overall_score: p.final_score || p.score,
            dimensions: p.dimension_scores || {},
            total_issues: p.total_issues,
            critical_issues: p.critical_remaining,
            summary: p.message,
            dry_run: false,
          });
        }
        loadHistory();
      }
    } catch(e) {}
  }, 2000);
}

function updateAutoUI(p) {
  document.getElementById('auto-round-label').textContent =
    p.status === 'completed' ? '✅ 已完成' :
    p.status === 'failed' ? '❌ 已终止' :
    `第 ${p.round || 0} 轮`;

  const pulse = document.getElementById('auto-pulse');
  pulse.className = 'auto-pulse ' + p.status;

  document.getElementById('auto-phase').textContent = phaseLabel(p);
  document.getElementById('auto-msg').textContent = p.message || '';
  document.getElementById('auto-round-num').textContent = `轮 ${p.round || 0}/15`;

  // score trend
  const history = p.score_history || [];
  const trendEl = document.getElementById('score-trend');
  if(history.length > 0) {
    const maxScore = Math.max(...history, 100);
    trendEl.innerHTML = history.map((s, i) => {
      const h = Math.max(4, (s / maxScore) * 56);
      const color = s >= 80 ? '#34d399' : s >= 50 ? '#fbbf24' : '#fb7185';
      return `<div class="trend-bar" style="height:${h}px;background:${color}" title="轮 ${i+1}: ${s}/100">
        <span class="bar-val">${s}</span>
      </div>`;
    }).join('');
  } else {
    trendEl.innerHTML = '<div style="color:#475569;font-size:0.7rem;padding:0.5rem">等待第一轮...</div>';
  }

  // dimension scores
  const dimScores = p.dimension_scores || {};
  const dimsEl = document.getElementById('auto-dims');
  const dimEntries = Object.entries(dimScores);
  if(dimEntries.length > 0) {
    dimsEl.innerHTML = dimEntries.map(([d, v]) => {
      const s = v.score || 0;
      const sc = s >= 80 ? '#34d399' : s >= 50 ? '#fbbf24' : '#fb7185';
      return `<div class="auto-dim-item">
        <span>${DIM_ICONS[d]||''}</span>
        <span>${v.label || d}</span>
        <span class="auto-dim-score" style="color:${sc}">${s}</span>
      </div>`;
    }).join('');
  }

  // stats row
  const stats = document.getElementById('auto-stats');
  if(p.score !== undefined) {
    stats.style.display = 'flex';
    document.getElementById('auto-cur-score').textContent = p.score;
    document.getElementById('auto-critical').textContent = p.critical_remaining ?? '--';
    document.getElementById('auto-total').textContent = p.total_issues ?? '--';
    document.getElementById('auto-fixed').textContent = (p.fixes_applied ?? p.optimization_applied ?? '--');
  }
}

// ═══ 多Agent自进化 ═══

async function startMultiAgent() {
  const target = getTarget();
  if(!target) return;
  setButtonsDisabled(true);
  const btn = document.getElementById('btn-multi');
  btn.textContent = '⏳ 启动中...';

  try {
    const res = await fetch('/api/optimize/start-agent', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ target_dir: target, start_now: true })
    });
    const data = await res.json();
    if(data.status === 'continuous') {
      alert('✅ 已启动！目标: ' + data.target_dir + '\n\ncronjob 每30分钟自动跑一轮');
      document.getElementById('btn-stop').disabled = false;  // 启用停止按钮
      setTimeout(loadAgentStatus, 3000);
      setInterval(loadAgentStatus, 10000);
    } else {
      alert('❌ 启动失败: ' + JSON.stringify(data));
    }
  } catch(e) {
    alert('❌ 网络错误: ' + e.message + '\n\n请确认 API 服务在运行：http://localhost:8000/health');
  }
  finally {
    btn.textContent = '🚀 多Agent自进化';
    document.getElementById('btn-scan').disabled = false;
    document.getElementById('btn-fix').disabled = false;
    document.getElementById('btn-auto').disabled = false;
    document.getElementById('btn-evolve').disabled = false;
    document.getElementById('btn-multi').disabled = false;
    // 停止按钮保持当前状态，不由这个函数控制
  }
}

function phaseLabel(p) {
  const labels = {
    starting: '🚀 启动中', initializing: '🚀 启动中', scanning: '🔍 扫描中',
    scanned: '📊 扫描完成', fixing_bugs: '🔧 修复Bug中',
    optimizing: '⚡ 主动优化中', converged: '✅ 收敛', done: '✅ 完成',
    error: '❌ 出错', optimized: '✅ 优化完成',
  };
  return labels[p.phase] || p.phase || '...';
}

// ═══ 结果显示 ═══

function displayResults(data) {
  const area = document.getElementById('results');
  area.classList.add('visible');

  const score = data.overall_score ?? 0;
  const scoreEl = document.getElementById('overall-score');
  scoreEl.textContent = score;
  scoreEl.className = 'score-number ' + (score >= 80 ? 'good' : score >= 50 ? 'ok' : 'bad');

  const barsEl = document.getElementById('dim-bars');
  barsEl.innerHTML = '';
  const dims = data.dimensions || {};
  let dimEntries = Object.entries(dims);
  if(dimEntries.length === 0) {
    barsEl.innerHTML = '<div style="color:#64748b;font-size:0.7rem">维度数据未返回</div>';
  } else {
    dimEntries.forEach(([dim, r]) => {
      const scoreVal = r.score ?? r.issue_count ?? 0;
      const maxScore = r.score !== undefined ? 100 : (r.issue_count || 1) * 5;
      const pct = Math.min(100, Math.round((scoreVal / maxScore) * 100));
      const bar = document.createElement('div');
      bar.className = 'dim-bar-row';
      bar.innerHTML = `
        <span class="dim-bar-label">${DIM_ICONS[dim]||''} ${r.label||dim}</span>
        <div class="dim-bar-track"><div class="dim-bar-fill" style="width:0%;background:${DIM_COLORS[dim]||'#64748b'}"></div></div>
        <span class="dim-bar-score">${scoreVal}</span>
      `;
      barsEl.appendChild(bar);
      requestAnimationFrame(() => { bar.querySelector('.dim-bar-fill').style.width = pct + '%'; });
    });
  }

  const allIssues = [];
  dimEntries.forEach(([dim, r]) => {
    (r.issues || []).forEach(iss => {
      allIssues.push({...iss, _dim: dim, _dimLabel: r.label || dim});
    });
  });
  currentAllIssues = allIssues;
  renderIssues(allIssues);

  // fix details (for evolution mode)
  const fixes = data.fixes || {};
  const fixDetails = fixes.details || [];
  const fixCard = document.getElementById('fix-details');
  const fixList = document.getElementById('fix-list');
  if(fixDetails.length > 0) {
    fixCard.style.display = 'block';
    fixList.innerHTML = fixDetails.map(f => {
      const ok = f.fix_result && f.fix_result.success;
      return `<div class="issue-item" style="border-left-color:${ok?'#34d399':'#fb7185'}">
        <div class="issue-line1">
          <span>${ok?'✅':'❌'} ${f.issue_type} · ${(f.file||'').split('/').pop()||''}:${f.line||0}</span>
          <span class="issue-type">${f.dimension||''}</span>
        </div>
        <div style="margin-top:0.3rem;color:${ok?'#34d399':'#fb7185'};font-size:0.7rem">
          ${escHtml(ok ? (f.fix_result.action||'已修复') : (f.fix_result.reason||f.fix_result.error||'修复失败'))}
        </div>
      </div>`;
    }).join('');
  } else {
    fixCard.style.display = 'none';
  }

  const tc = data.total_issues || 0;
  const cc = data.critical_issues || 0;
  document.getElementById('result-summary').textContent =
    `发现 ${tc} 个问题（Critical ${cc} 个）` +
    (data.dry_run ? ' | 仅扫描模式' : '');
}

let currentAllIssues = [];

function renderIssues(issues) {
  const el = document.getElementById('issues-list');
  if(issues.length === 0) {
    el.innerHTML = '<div class="empty-issues">✅ 未发现任何问题</div>'; return;
  }
  el.innerHTML = issues.map((iss, i) => {
    const sev = (iss.severity || 'low').toLowerCase();
    return `<div class="issue-item ${sev}" onclick="this.classList.toggle('expanded')">
      <div class="issue-line1">
        <span><span class="issue-badge badge-${sev}">${sev.toUpperCase()}</span>
          ${iss.type || 'unknown'} · ${(iss.file || '').split('/').pop()||''}:${iss.line||0}</span>
        <span class="issue-type">${iss._dimLabel||''}</span>
      </div>
      <div style="margin-top:0.3rem;color:#cbd5e1">${escHtml(iss.description||'')}</div>
      <div class="issue-detail">
        ${iss.suggestion ? '<strong>建议:</strong> '+escHtml(iss.suggestion)+'<br>' : ''}
        ${iss.code ? '<code style="display:block;background:#0f172a;padding:0.3rem;border-radius:0.3rem;margin-top:0.3rem;font-size:0.7rem">'+escHtml(iss.code)+'</code>' : ''}
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function filterIssues(filter, btn) {
  document.querySelectorAll('.issues-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if(!currentAllIssues) return;
  const filtered = filter === 'all' ? currentAllIssues
    : currentAllIssues.filter(i => (i.severity||'low').toLowerCase() === filter);
  renderIssues(filtered);
}

function stopAll() {
  if(pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if(autoPollTimer) { clearInterval(autoPollTimer); autoPollTimer = null; }
  // Stop cronjob
  fetch('/api/optimize/stop-agent', {method:'POST'}).then(r => r.json()).then(d => {
    alert(d.message || '已停止');
  }).catch(() => {});
  setButtonsDisabled(false);
}

    const runs = await res.json();
    const el = document.getElementById('history-list');
    if(runs.length === 0) {
      el.innerHTML = '<div style="color:#475569;font-size:0.7rem;text-align:center;padding:1rem">暂无记录</div>';
      return;
    }
    el.innerHTML = runs.map(r => {
      const st = r.status === 'running' ? 'running' : r.status === 'completed' ? 'completed' : 'failed';
      const type = r.type === 'auto' ? '<span class="h-type">监控</span>' : r.type === 'evolve' ? '<span class="h-type" style="background:#ea580c;color:#fff">进化</span>' : '<span class="h-type">扫描</span>';
      const score = r.score !== null && r.score !== undefined
        ? `<span class="h-item-score" style="${r.score<60?'color:#fb7185':r.score<80?'color:#fbbf24':'color:#34d399'}">${r.score}/100</span>` : '';
      const highBadge = r.high ? `<span style="color:#fb7185;font-size:0.6rem">H${r.high}</span>` : '';
      const fixBadge = r.fixes ? `<span style="color:#34d399;font-size:0.6rem">✅${r.fixes}</span>` : '';
      return `<div class="history-item ${r.run_id === currentRunId ? 'active' : ''}" onclick="loadHistoryRun('${r.run_id}')">
        <div><span class="h-status ${st}"></span>${st==='completed'?'✅':st==='running'?'⏳':'❌'} ${st} ${type}</div>
        <div class="h-item-path">${(r.target_dir||'?').split('/').slice(-2).join('/')}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          ${score}
          <span>${highBadge} ${fixBadge}</span>
          <span class="h-item-time">${r.total_issues||'--'} 问题</span>
        </div>
        <div class="h-item-time">${(r.finished_at||r.started_at||'').slice(5,19).replace('T',' ')}</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function loadHistoryRun(runId) {
  try {
    const res = await fetch(`/api/optimize/runs/${runId}`);
    const data = await res.json();
    if(data.status === 'running') {
      currentRunId = runId;
      if(data.type === 'auto') { pollAutoProgress(runId); }
      else { pollResult(runId); }
      return;
    }
    if(data.type === 'auto') {
      document.getElementById('auto-panel').classList.add('visible');
    }
    displayResults(data);
  } catch(e) {}
}

// init
checkApi().then(ok => { if(ok) { loadDimensions(); loadHistory(); } });
setInterval(checkApi, 30000);
</script>
