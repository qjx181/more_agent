<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目三：多Agent 仪表盘</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #f0f6fc; }
  .subtitle { color: var(--text-dim); margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card .value { font-size: 28px; font-weight: 600; }
  .card .value.green { color: var(--green); }
  .card .value.yellow { color: var(--yellow); }
  .card .value.red { color: var(--red); }
  .status-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.green { background: var(--green); }
  .status-dot.yellow { background: var(--yellow); }
  .status-dot.red { background: var(--red); }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { color: var(--text-dim); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .task-pending { color: var(--yellow); }
  .task-completed { color: var(--green); }
  button, .btn { background: #21262d; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #30363d; }
  button.primary { background: #238636; border-color: #2ea043; color: #fff; }
  button.primary:hover { background: #2ea043; }
  button.danger { background: #da3633; border-color: #f85149; color: #fff; }
  button.danger:hover { background: #f85149; }
  form { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: end; }
  form label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  form input { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; width: 100%; }
  .form-group { flex: 1; min-width: 180px; }
  .form-actions { display: flex; gap: 8px; }
  .section { margin-bottom: 32px; }
  .section h2 { font-size: 18px; margin-bottom: 12px; color: #f0f6fc; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--green); border-radius: var(--radius); padding: 12px 20px; font-size: 14px; display: none; animation: slideIn 0.3s ease; }
  .toast.error { border-color: var(--red); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .loading { opacity: 0.5; pointer-events: none; }
  @media (max-width: 768px) { form { flex-direction: column; } .form-group { min-width: 100%; } }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ 项目三：多Agent 仪表盘</h1>
  <div class="subtitle">Swarm 自进化引擎 — 实时控制面板</div>

  <div class="status-bar" id="statusBar">
    <span class="status-badge"><span class="status-dot green" id="healthDot"></span><span id="healthText">正在连接...</span></span>
    <span class="status-badge">🔄 轮次 <span id="currentRound">-</span></span>
    <span class="status-badge">📊 成功率 <span id="successRate">-</span>%</span>
    <span class="status-badge">💰 今日 $<span id="dollarSpent">-</span> / $<span id="dollarLimit">-</span></span>
  </div>

  <div class="grid" id="metricsGrid">
    <div class="card"><div class="label">完成任务</div><div class="value green" id="completedTasks">-</div></div>
    <div class="card"><div class="label">待处理任务</div><div class="value yellow" id="pendingTasks">-</div></div>
    <div class="card"><div class="label">总轮次数</div><div class="value" id="totalRounds">-</div></div>
    <div class="card"><div class="label">运行时长</div><div class="value" id="uptime">-</div></div>
  </div>

  <div class="section">
    <h2>📋 任务列表</h2>
    <div style="overflow-x:auto"><table id="taskTable">
      <thead><tr><th>ID</th><th>描述</th><th>类别</th><th>状态</th><th></th></tr></thead>
      <tbody id="taskBody"></tbody>
    </table></div>
  </div>

  <div class="section">
    <h2>🐛 提交 Bug / 扫描项目</h2>
    <form id="bugForm" style="max-width:700px">
      <div class="form-group" style="min-width:100%;margin-bottom:12px">
        <label>项目路径 <span style="color:var(--text-dim);font-weight:normal">(必填，不填则只分析错误日志)</span></label>
        <input type="text" id="bugProjectPath" placeholder="例如: C:\Users\qjx\Desktop\agent-自进化版\项目一">
      </div>
      <div class="form-group" style="min-width:100%;margin-bottom:12px">
        <label>错误日志 / Traceback <span style="color:var(--text-dim);font-weight:normal">(可选，不填则只扫描项目)</span></label>
        <textarea id="bugErrorText" placeholder="粘贴 Python Traceback / Java Stack Trace / CI 日志...（不填则扫描项目）" style="height:120px;background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:monospace;width:100%;resize:vertical"></textarea>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="form-group" style="margin:0;min-width:120px">
          <label>来源</label>
          <select id="bugSourceType" style="background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:14px">
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="ci">CI/CD</option>
          </select>
        </div>
        <button type="submit" class="primary">🔍 分析 Bug</button>
      </div>
    </form>

    <div id="bugResult" style="display:none;margin-top:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span id="bugResultIcon" style="font-size:20px"></span>
        <strong id="bugResultTitle" style="font-size:16px"></strong>
        <span id="bugResultId" style="color:var(--text-dim);font-size:13px;margin-left:auto"></span>
      </div>
      <div id="bugResultContent" style="font-size:13px;line-height:1.6"></div>
      <div id="bugResultActions" style="margin-top:12px;display:none">
        <button class="primary" id="fixBugBtn">🔧 立即修复</button>
        <span style="color:var(--text-dim);font-size:12px;margin-left:8px" id="fixBugHint"></span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>📊 Bug 历史</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn" id="refreshBugsBtn">🔄 刷新列表</button>
      <button class="btn" id="clearBugResultBtn">清除结果</button>
    </div>
    <div id="bugList" style="max-height:400px;overflow-y:auto">
      <div style="color:var(--text-dim);text-align:center;padding:20px">加载中...</div>
    </div>
  </div>

  <div class="section">
    <h2>🎮 控制</h2>
    <button class="primary" id="triggerBtn">▶ 触发一轮进化</button>
    <button id="refreshBtn">🔄 刷新数据</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var currentBugId = null;

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3000);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function fetchJSON(url, opts) {
  opts = opts || {};
  var r = await fetch(url, opts);
  if (!r.ok) {
    var err = await r.json().catch(function() { return { detail: r.statusText }; });
    throw new Error(err.detail || r.status + ' ' + r.statusText);
  }
  return r.json();
}

async function loadMetrics() {
  try {
    var m = await fetchJSON('/api/metrics');
    document.getElementById('currentRound').textContent = m.current_round || '-';
    document.getElementById('completedTasks').textContent = m.completed_tasks != null ? m.completed_tasks : '-';
    document.getElementById('pendingTasks').textContent = m.pending_tasks != null ? m.pending_tasks : '-';
    document.getElementById('totalRounds').textContent = m.rounds_total != null ? m.rounds_total : '-';
    document.getElementById('successRate').textContent = m.success_rate != null ? m.success_rate : '-';
    document.getElementById('dollarSpent').textContent = (m.dollar_spent_today != null ? m.dollar_spent_today : 0).toFixed(2);
    document.getElementById('dollarLimit').textContent = (m.dollar_limit != null ? m.dollar_limit : 5).toFixed(2);
    var uptime = m.uptime_seconds != null ? m.uptime_seconds : 0;
    var h = Math.floor(uptime / 3600), min = Math.floor((uptime % 3600) / 60);
    document.getElementById('uptime').textContent = h + 'h ' + min + 'm';
    document.getElementById('healthText').textContent = '运行中';
    document.getElementById('healthDot').className = 'status-dot green';
  } catch(e) {
    document.getElementById('healthText').textContent = '连接失败';
    document.getElementById('healthDot').className = 'status-dot red';
    console.error('loadMetrics error:', e);
  }
}

async function loadTasks() {
  try {
    var tasks = await fetchJSON('/api/tasks');
    var tbody = document.getElementById('taskBody');
    if (!tasks || tasks.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim);text-align:center">暂无任务</td></tr>';
      return;
    }
    var html = '';
    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i];
      var statusClass = t.status === 'completed' ? 'task-completed' : 'task-pending';
      var statusText = t.status === 'completed' ? '✅ 已完成' : '⏳ 待处理';
      var desc = t.description ? t.description.substring(0, 60) : '-';
      html += '<tr><td><code>' + escapeHtml(t.id || '-') + '</code></td><td>' + escapeHtml(desc) + '</td><td>' + escapeHtml(t.category || '-') + '</td><td class="' + statusClass + '">' + statusText + '</td><td><button class="danger" onclick="deleteTask(\'' + escapeHtml(t.id || '') + '\')">删除</button></td></tr>';
    }
    tbody.innerHTML = html;
  } catch(e) {
    console.error('load tasks error:', e);
  }
}

async function deleteTask(id) {
  if (!confirm('确定删除任务 "' + id + '" 吗？')) return;
  try {
    var r = await fetch('/api/tasks/' + encodeURIComponent(id), { method: 'DELETE' });
    if (!r.ok) throw new Error((await r.json()).detail || '删除失败');
    showToast('✅ 任务 ' + id + ' 已删除');
    loadTasks();
  } catch(e) {
    showToast('❌ ' + e.message, true);
  }
}

async function refreshAll() {
  document.body.classList.add('loading');
  await loadMetrics();
  await loadTasks();
  await loadBugs();
  document.body.classList.remove('loading');
}

document.getElementById('triggerBtn').onclick = async function() {
  this.disabled = true;
  this.textContent = '⏳ 正在触发...';
  try {
    var r = await fetch('/api/trigger', { method: 'POST' });
    if (!r.ok) throw new Error((await r.json()).detail || '触发失败');
    var data = await r.json();
    showToast('✅ ' + data.message);
  } catch(e) {
    showToast('❌ ' + e.message, true);
  }
  this.disabled = false;
  this.textContent = '▶ 触发一轮进化';
};

document.getElementById('refreshBtn').onclick = refreshAll;

// Bug 功能
async function loadBugs() {
  var container = document.getElementById('bugList');
  container.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px">加载中...</div>';
  try {
    var bugs = await fetchJSON('/api/bugs?limit=30');
    if (!bugs || bugs.length === 0) {
      container.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px">暂无 Bug 记录</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < bugs.length; i++) {
      var b = bugs[i];
      var conf = b.confidence != null ? b.confidence : 0;
      var confColor = conf >= 0.8 ? 'var(--green)' : conf >= 0.5 ? 'var(--yellow)' : 'var(--red)';
      var statusMap = { analyzed: ['var(--text-dim)', '已分析'], pending_fix: ['var(--yellow)', '待修复'], fixing: ['var(--accent)', '修复中'], fixed: ['var(--green)', '已修复'], failed: ['var(--red)', '失败'] };
      var sm = statusMap[b.status] || ['var(--text-dim)', b.status || '未知'];
      var fileName = b.file ? b.file.split(/[/\\]/).pop() : '-';
      var lineNum = b.line > 0 ? ':' + b.line : '';
      var projName = b.project_path ? b.project_path.split(/[/\\]/).pop() : '';
      var ts = b.timestamp ? b.timestamp.slice(0, 16) : '';
      var statusBtn = (b.project_path && (b.status === 'pending_fix' || b.status === 'fixing'))
        ? '<button class="btn primary" style="padding:4px 10px;font-size:12px" onclick="fixBug(\'' + b.id + '\')">🔧 修复</button>'
        : '';
      html += '<div style="padding:12px 0;border-bottom:1px solid var(--border)">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<span style="font-weight:600;color:var(--accent);font-size:13px">' + b.id + '</span>' +
        '<span style="background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1px 8px;font-size:11px;color:' + sm[0] + '">' + sm[1] + '</span>' +
        '<span style="color:var(--text-dim);font-size:12px;margin-left:auto">' + ts + '</span></div>' +
        '<div style="color:var(--text);font-size:13px">' +
        '<span style="color:var(--red)">' + escapeHtml(b.error_type || '?') + '</span>' +
        ' &nbsp;·&nbsp; <span style="color:var(--text-dim)">' + escapeHtml(fileName) + lineNum + '</span>' +
        (projName ? ' <span style="color:var(--text-dim);font-size:11px"> → ' + escapeHtml(projName) + '</span>' : '') +
        ' &nbsp;·&nbsp; <span style="color:' + confColor + ';font-size:12px">置信度 ' + (conf * 100).toFixed(0) + '%</span></div>' +
        '<div style="color:var(--text-dim);font-size:12px;margin-top:4px">' + escapeHtml((b.message || '').slice(0, 80)) + '</div>' +
        (b.project_path ? '<div style="margin-top:6px"><button class="btn" style="padding:4px 10px;font-size:12px" onclick="viewBug(\'' + b.id + '\')">查看详情</button> ' + statusBtn + '</div>' : '') +
        '</div>';
    }
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div style="color:var(--red);text-align:center;padding:20px">加载失败: ' + escapeHtml(e.message) + '</div>';
  }
}

async function submitBug(errorText, projectPath, sourceType) {
  var resultDiv = document.getElementById('bugResult');
  var content = document.getElementById('bugResultContent');
  resultDiv.style.display = 'block';
  content.innerHTML = '<div style="color:var(--text-dim)">⏳ 正在分析...</div>';
  document.getElementById('bugResultActions').style.display = 'none';

  try {
    var data = await fetchJSON('/api/bugs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ error_text: errorText, project_path: projectPath, source_type: sourceType })
    });

    currentBugId = data.bug_id;
    var conf = data.analysis && data.analysis.confidence != null ? data.analysis.confidence : 0;
    var confColor = conf >= 0.8 ? 'var(--green)' : conf >= 0.5 ? 'var(--yellow)' : 'var(--red)';

    document.getElementById('bugResultId').textContent = 'ID: ' + (data.bug_id || data.scan_result && data.scan_result.bug_count || 'N/A');

    var analysis = data.analysis || {};
    var file = analysis.file || '-';
    var line = analysis.line > 0 ? ':' + analysis.line : '';

    content.innerHTML =
      '<table style="width:100%;border-collapse:collapse;font-size:13px">' +
      '<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0;color:var(--text-dim);width:80px">错误类型</td><td style="padding:6px 0;color:var(--red)"><strong>' + escapeHtml(analysis.error_type || '-') + '</strong></td></tr>' +
      '<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0;color:var(--text-dim)">位置</td><td style="padding:6px 0;color:var(--text)">' + escapeHtml(file) + escapeHtml(line) + '</td></tr>' +
      '<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0;color:var(--text-dim)">置信度</td><td style="padding:6px 0;color:' + confColor + '">' + (conf * 100).toFixed(0) + '%</td></tr>' +
      '<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0;color:var(--text-dim);vertical-align:top">根因</td><td style="padding:6px 0;color:var(--text)">' + escapeHtml(analysis.root_cause || '-') + '</td></tr>' +
      '<tr><td style="padding:6px 0;color:var(--text-dim);vertical-align:top">建议修复</td><td style="padding:6px 0;color:var(--accent)">' + escapeHtml(analysis.suggested_fix || '-') + '</td></tr>' +
      '</table>' +
      '<div style="margin-top:10px;padding:10px;background:#0d1117;border-radius:6px;font-size:12px;color:' + (data.can_fix ? 'var(--green)' : 'var(--yellow)') + '">' + escapeHtml(data.message || data.scan_result && '扫描完成: ' + data.scan_result.bug_count + ' 个问题') + '</div>';

    if (data.scan_result) {
      var sr = data.scan_result;
      content.innerHTML += '<div style="margin-top:10px;padding:10px;background:#0d1117;border-radius:6px;font-size:13px">' +
        '<div style="color:var(--accent);margin-bottom:6px">📊 扫描结果: ' + sr.bug_count + ' 个问题，扫描了 ' + sr.py_files_scanned + ' 个文件</div>';
      if (sr.findings && sr.findings.length > 0) {
        for (var fi = 0; fi < sr.findings.slice(0, 10).length; fi++) {
          var f = sr.findings[fi];
          var sevColor = f.severity === 'error' ? 'var(--red)' : f.severity === 'warning' ? 'var(--yellow)' : 'var(--accent)';
          content.innerHTML += '<div style="margin-top:4px;font-size:12px"><span style="color:' + sevColor + '">[' + f.severity + ']</span> ' + escapeHtml(f.file.split(/[/\\]/).pop()) + ':' + f.line + ' — ' + escapeHtml(f.detail) + '</div>';
        }
        if (sr.findings.length > 10) {
          content.innerHTML += '<div style="color:var(--text-dim);font-size:12px;margin-top:4px">...还有 ' + (sr.findings.length - 10) + ' 条</div>';
        }
      }
      content.innerHTML += '</div>';
    }

    var actions = document.getElementById('bugResultActions');
    var hint = document.getElementById('fixBugHint');
    if (data.can_fix) {
      actions.style.display = 'block';
      hint.textContent = '项目: ' + escapeHtml(projectPath);
      document.getElementById('bugResultIcon').textContent = '✅';
      document.getElementById('bugResultTitle').textContent = '分析完成，可修复';
      document.getElementById('bugResultTitle').style.color = 'var(--green)';
    } else {
      actions.style.display = 'none';
      hint.textContent = '';
      document.getElementById('bugResultIcon').textContent = '⚠️';
      document.getElementById('bugResultTitle').textContent = '分析完成，置信度不足';
      document.getElementById('bugResultTitle').style.color = 'var(--yellow)';
    }
  } catch(e) {
    content.innerHTML = '<div style="color:var(--red)">❌ 分析失败: ' + escapeHtml(e.message) + '</div>';
    console.error('submitBug error:', e);
  }
}

async function fixBug(bugId) {
  if (!confirm('确定要在指定项目中修复此 Bug 吗？\n\n修复会直接修改项目文件。')) return;
  var btn = document.getElementById('fixBugBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 修复中...';
  try {
    var r = await fetch('/api/bugs/' + encodeURIComponent(bugId) + '/fix', { method: 'POST' });
    var data = await r.json();
    showToast('🔧 ' + (data.message || '修复完成'));
    setTimeout(function() { refreshBugResult(bugId); }, 2000);
  } catch(e) {
    showToast('❌ ' + e.message, true);
    btn.disabled = false;
    btn.textContent = '🔧 立即修复';
  }
}

async function refreshBugResult(bugId) {
  try {
    var data = await fetchJSON('/api/bugs/' + encodeURIComponent(bugId) + '/fix');
    var content = document.getElementById('bugResultContent');
    var icon = document.getElementById('bugResultIcon');
    var title = document.getElementById('bugResultTitle');
    var btn = document.getElementById('fixBugBtn');
    var status = data.status;
    icon.textContent = status === 'fixed' ? '✅' : status === 'failed' ? '❌' : '⏳';
    title.textContent = status === 'fixed' ? '修复成功' : status === 'failed' ? '修复失败' : '修复中...';
    title.style.color = status === 'fixed' ? 'var(--green)' : status === 'failed' ? 'var(--red)' : 'var(--yellow)';
    if (data.fix_result) {
      var fr = data.fix_result;
      var frColor = fr.success ? 'var(--green)' : 'var(--red)';
      content.innerHTML = '<div style="margin-top:8px;padding:10px;background:#0d1117;border-radius:6px;font-size:13px">' +
        '<div style="color:' + frColor + ';margin-bottom:6px">' + (fr.success ? '✅' : '❌') + ' ' + escapeHtml(fr.details) + '</div>' +
        '<div style="color:var(--text-dim);font-size:12px">文件: ' + escapeHtml(fr.file) + '<br>验证: ' + escapeHtml(fr.verification || '-') + '</div></div>';
    } else {
      content.innerHTML += '<div style="margin-top:8px;color:var(--text-dim);font-size:12px">⏳ ' + escapeHtml(data.message || '') + '</div>';
    }
    if (status !== 'fixing') {
      btn.disabled = false;
      btn.textContent = '🔧 立即修复';
    } else {
      setTimeout(function() { refreshBugResult(bugId); }, 3000);
    }
  } catch(e) {
    console.error('refreshBugResult error:', e);
  }
}

async function viewBug(bugId) {
  try {
    var bug = await fetchJSON('/api/bugs/' + encodeURIComponent(bugId));
    var content = document.getElementById('bugResultContent');
    document.getElementById('bugResult').style.display = 'block';
    document.getElementById('bugResultIcon').textContent = '📋';
    document.getElementById('bugResultTitle').textContent = 'Bug #' + bugId + ' 详情';
    document.getElementById('bugResultTitle').style.color = 'var(--text)';
    document.getElementById('bugResultId').textContent = '';
    content.innerHTML =
      '<table style="width:100%;border-collapse:collapse;font-size:13px">' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">错误类型</td><td style="padding:4px 0;color:var(--red)">' + escapeHtml(bug.error_type || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">文件</td><td style="padding:4px 0;color:var(--text)">' + escapeHtml(bug.file || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">行号</td><td style="padding:4px 0;color:var(--text)">' + (bug.line || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">消息</td><td style="padding:4px 0;color:var(--text)">' + escapeHtml(bug.message || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">根因</td><td style="padding:4px 0;color:var(--accent)">' + escapeHtml(bug.root_cause || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">建议修复</td><td style="padding:4px 0">' + escapeHtml(bug.suggested_fix || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">项目路径</td><td style="padding:4px 0;color:var(--text)">' + escapeHtml(bug.project_path || '(未指定)') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">状态</td><td style="padding:4px 0">' + escapeHtml(bug.status || '-') + '</td></tr>' +
      '<tr><td style="padding:4px 0;color:var(--text-dim)">时间</td><td style="padding:4px 0;color:var(--text-dim)">' + escapeHtml(bug.timestamp || '-') + '</td></tr>' +
      '</table>';
    var actions = document.getElementById('bugResultActions');
    if (bug.project_path && (bug.status === 'pending_fix' || bug.status === 'fixing')) {
      actions.style.display = 'block';
      document.getElementById('fixBugHint').textContent = '项目: ' + escapeHtml(bug.project_path);
      if (bug.status === 'fixing') refreshBugResult(bugId);
    } else {
      actions.style.display = 'none';
    }
    currentBugId = bugId;
  } catch(e) {
    showToast('❌ ' + e.message, true);
  }
}

function clearBugResult() {
  document.getElementById('bugResult').style.display = 'none';
  currentBugId = null;
}

document.getElementById('bugForm').onsubmit = async function(e) {
  e.preventDefault();
  var errorText = document.getElementById('bugErrorText').value.trim();
  var projectPath = document.getElementById('bugProjectPath').value.trim();
  var sourceType = document.getElementById('bugSourceType').value;
  if (!errorText && !projectPath) { showToast('❌ 请填写项目路径或错误日志', true); return; }
  await submitBug(errorText, projectPath, sourceType);
};

document.getElementById('fixBugBtn').onclick = async function() {
  if (currentBugId) await fixBug(currentBugId);
};

document.getElementById('refreshBugsBtn').onclick = loadBugs;
document.getElementById('clearBugResultBtn').onclick = clearBugResult;

// 初次加载
refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
