# ═══════════════════════════════════════════════════════════════════════
# docker-compose.yml — 项目三：多Agent 容器化编排
# ═══════════════════════════════════════════════════════════════════════
# 服务：
#   swarm          — 自进化引擎（核心服务）
#   metrics-exporter — Prometheus /metrics 端点（HTTP 9090）
#   redis          — 分布式锁 + 状态缓存（可选）
#
# 使用：
#   docker compose -f scripts/docker/docker-compose.yml up -d
#   docker compose -f scripts/docker/docker-compose.yml logs -f swarm
# ═══════════════════════════════════════════════════════════════════════

services:
  # ─── Swarm 自进化引擎 ────────────────────────────────────────────────
  swarm:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
    container_name: swarm-agent
    restart: unless-stopped
    volumes:
      # 项目代码（开发模式热更新）
      - .:/app
      # 持久化数据
      - swarm-logs:/app/logs
      - swarm-metrics:/app/metrics
      # ssh 密钥（git push 用）
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro
    environment:
      - SWARM_ROUND_INTERVAL=${SWARM_ROUND_INTERVAL:-30}
      - AUDIT_LOG_ENABLED=true
      - AUDIT_LOG_PATH=/app/logs/audit.jsonl
      - PROMETHEUS_PORT=9090
      # 密钥从 .env 加载（不写在 yml 中）
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      # Git 配置
      - GIT_USER_NAME=${GIT_USER_NAME:-swarm-agent}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-swarm@agent.local}
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Metrics Exporter — Prometheus 指标端点 ──────────────────────────
  metrics-exporter:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
    container_name: swarm-metrics
    restart: unless-stopped
    command: ["metrics"]
    volumes:
      - swarm-metrics:/app/metrics:ro
    ports:
      - "9091:9091"
    environment:
      - PROMETHEUS_PORT=9091
    profiles:
      - monitoring

  # ─── Redis — 分布式锁与状态缓存 ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: swarm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - redis

  # ─── API 服务 + Web 仪表盘 ─────────────────────────────────────────
  api-service:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
    container_name: swarm-api
    restart: unless-stopped
    command: ["api"]
    volumes:
      - .:/app
      - swarm-logs:/app/logs:ro
    ports:
      - "8000:8000"
    environment:
      - API_PORT=8000
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  swarm-logs:
  swarm-metrics:
  redis-data:
