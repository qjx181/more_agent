# ═══════════════════════════════════════════════════════════════════
# Swarm Multi-Agent System — 全局配置文件
# ═══════════════════════════════════════════════════════════════════
#
# 本文件是 swarm 系统的 YAML 示例配置文件，集成了 swarm_config.py 和
# swarm_logger.py 的所有可配置选项。配置加载优先级（由低到高）:
#   1. 模块内置默认值（swarm_config.py 中的 DEFAULT_CONFIG）
#   2. config.yaml（本文件）
#   3. .env 文件 + 系统环境变量（SWARM_* 前缀）—— 最高优先
#
# 本文件包含完整注释，方便人类阅读理解。所有值均为合理的默认值。
# 可按需复制到项目中修改使用。
#
# ═══════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────
# swarm 节 — 系统核心运行参数
# ──────────────────────────────────────────────────────────────────
# 控制 swarm 主循环的调度间隔、心跳机制和目录布局。
# 对应 swarm_config.py DEFAULT_CONFIG["swarm"] 的所有字段。
# ──────────────────────────────────────────────────────────────────
swarm:
  # round_interval_minutes: 每轮迭代的间隔时间（分钟）
  # 控制 swarm 主循环两次执行之间的等待时间。值越小，迭代越频繁。
  # 类型: int，最小值: 1
  # 默认: 30（由 swarm_config.py 定义）
  round_interval_minutes: 30

  # heartbeat_timeout_seconds: 心跳超时阈值（秒）
  # 若某 agent 的心跳文件在此时间内未更新，视其为"失联"。
  # 类型: int，最小值: 1
  # 默认: 30
  heartbeat_timeout_seconds: 30

  # heartbeat_dir: 心跳文件存储目录
  # 相对路径（相对于项目根目录）或绝对路径。用于存放各 agent
  # 周期刷新的心跳文件，供 orchestrator 监控存活性。
  # 类型: str
  # 默认: "heartbeats"
  heartbeat_dir: "heartbeats"

  # log_dir: 日志文件存放目录
  # 如果 logger.log_file 未指定，日志文件将自动创建在此目录下。
  # 类型: str
  # 默认: "logs"
  log_dir: "logs"

  # tmp_dir: 临时文件存放目录
  # 用于存放 agent 工作报告、临时中间产物等。
  # 类型: str
  # 默认: "tmp_agent"
  tmp_dir: "tmp_agent"

# ──────────────────────────────────────────────────────────────────
# cost_strategy 节 — 三级成本策略（项2/3）
# ──────────────────────────────────────────────────────────────────
# 根据当日已花费的 LLM 调用金额，动态调整任务调度策略。
# cost_tracker 在每轮 Step 1（决策）前读取 daily_budget 判断。
# ──────────────────────────────────────────────────────────────────
cost_strategy:
  # daily_budget_dollars: 每日预算上限（美元）
  # 类型: float，最小值: 0
  # 默认: 5.0
  daily_budget_dollars: 5.0

  # tiers: 三级策略阈值
  # 绿色（< tier2_boundary）: 正常调度所有任务
  # 黄色（>= tier2_boundary, < tier3_boundary）: 跳过 feature 类任务
  # 红色（>= tier3_boundary）: 只读模式（仅更新 TODO，不执行 LLM 调用）
  # 类型: dict
  tiers:
    # tier2_boundary: 黄色阈值（美元）
    # 超过此金额进入黄色模式，跳过 feature 任务
    # 类型: float
    tier2_boundary: 2.0

    # tier3_boundary: 红色阈值（美元）
    # 超过此金额进入红色模式，只读
    # 类型: float
    tier3_boundary: 4.5

  # skip_task_types_on_yellow: 黄色模式下跳过的任务类型
  # 类型: list[str]
  skip_task_types_on_yellow:
    - "feature"
    - "refactor"

# ──────────────────────────────────────────────────────────────────
# container_pool 节 — 容器预热池配置（项1）
# ──────────────────────────────────────────────────────────────────
# 控制 Docker 容器预热池的自动扩缩容行为。
# ContainerPoolMonitor 每 scan_interval_seconds 扫描一次池状态。
# ──────────────────────────────────────────────────────────────────
container_pool:
  # enabled: 是否启用自动扩缩容
  # 类型: bool
  # 默认: true
  enabled: true

  # max_pool_size: 容器池最大数量
  # 自动扩容时上限不超过此值
  # 类型: int，最小值: 1
  # 默认: 10
  max_pool_size: 10

  # min_pool_size: 容器池最小保留数量
  # 自动缩容时保留不低于此值的常驻容器
  # 类型: int，最小值: 0
  # 默认: 2
  min_pool_size: 2

  # scan_interval_seconds: 池状态扫描间隔（秒）
  # ContainerPoolMonitor 每隔此秒数检查一次队列长度和容器空闲状态
  # 类型: int，最小值: 10
  # 默认: 300（5分钟）
  scan_interval_seconds: 300

  # queue_scale_up_threshold: 扩容队列长度阈值
  # 当等待队列超过此长度且持续超过 queue_wait_seconds，触发扩容
  # 类型: int，最小值: 1
  # 默认: 2
  queue_scale_up_threshold: 2

  # queue_wait_seconds: 扩容等待时间阈值（秒）
  # 等待队列需持续超过此时间才触发扩容（防抖动）
  # 类型: int，最小值: 1
  # 默认: 10
  queue_wait_seconds: 10

  # idle_cleanup_threshold: 空闲容器清理阈值
  # 当空闲容器数超过此值时，停止最旧的几个直到等于此值
  # 类型: int，最小值: 0
  # 默认: 3
  idle_cleanup_threshold: 3

  # docker_image: 预热容器使用的 Docker 镜像
  # ContainerPoolMonitor 首次拉起容器时 pull 此镜像
  # 类型: str
  # 默认: "python:3.11-slim"
  docker_image: "python:3.11-slim"

  # container_workdir: 容器内工作目录
  # 类型: str
  # 默认: "/workspace"
  container_workdir: "/workspace"

# ──────────────────────────────────────────────────────────────────
# self_healing 节 — 自愈参数（项8）
# ──────────────────────────────────────────────────────────────────
# 控制 self_evolve_round.py 中三项自愈逻辑的行为参数。
# ──────────────────────────────────────────────────────────────────
self_healing:
  # conflict_timeout_seconds: git 冲突超时阈值（秒）
  # 冲突持续时间超过此值时，自动执行 git reset --hard HEAD
  # 类型: int，最小值: 60
  # 默认: 3600（1小时）
  conflict_timeout_seconds: 3600

  # pid_zombie_timeout_seconds: PID 文件僵尸超时阈值（秒）
  # PID 文件超过此时间未更新且进程不存活时，自动删除并重启
  # 类型: int，最小值: 10
  # 默认: 120（2分钟）
  pid_zombie_timeout_seconds: 120

  # disk_min_mb: 磁盘最小空间阈值（MB）
  # 可用磁盘低于此值时触发日志清理
  # 类型: int，最小值: 50
  # 默认: 100
  disk_min_mb: 100

  # disk_target_mb: 日志清理后目标空间（MB）
  # 清理旧日志直到可用空间恢复到不少于此值
  # 类型: int，最小值: 100
  # 默认: 500
  disk_target_mb: 500

# ──────────────────────────────────────────────────────────────────
# agents 节 — Agent 运行参数
# ──────────────────────────────────────────────────────────────────
# 控制哪些 agent 被启用以及单个 agent 的超时时间。
# 对应 swarm_config.py DEFAULT_CONFIG["agents"] 的所有字段。
# ──────────────────────────────────────────────────────────────────
agents:
  # enabled: 启用的 agent 编号列表
  # 只有列表中的 agent 会被分配到任务和执行。空列表表示不启用任何 agent。
  # 类型: list[int]
  # 默认: [1, 2, 3, 4, 5, 6, 7, 8]
  enabled: [1, 2, 3, 4, 5, 6, 7, 8]

  # timeout_minutes: 单个 agent 任务执行超时时间（分钟）
  # 超过此时间未返回结果的 agent 将被强制终止。
  # 类型: int，最小值: 1
  # 默认: 10
  timeout_minutes: 10

# ──────────────────────────────────────────────────────────────────
# logger 节 — 日志配置
# ──────────────────────────────────────────────────────────────────
# 控制 SwarmLogger 的行为。所有参数对应 swarm_logger.py 中
# SwarmLogger.__init__() 的构造函数参数。
# ──────────────────────────────────────────────────────────────────
logger:
  # name: 日志器名称
  # 同时也是内部 logging.Logger 的名称，影响日志输出前缀和默认文件名。
  # 类型: str
  # 默认: "swarm"
  name: "swarm"

  # level: 日志级别
  # 可选值（不区分大小写）:
  #   DEBUG    — 最详细，包含调试信息
  #   INFO     — 常规信息（推荐生产环境使用）
  #   WARNING  — 仅警告及以上
  #   ERROR    — 仅错误及以上
  #   CRITICAL — 仅致命错误
  # 类型: str
  # 默认: "INFO"
  level: "INFO"

  # log_file: 日志文件路径
  # - 设为空字符串 "" 或 null: 不输出到文件（仅控制台）
  # - 设为具体路径（如 "logs/swarm.log"）: 输出到此文件
  # - 不设置（留空）: 自动在 swarm.log_dir 下创建 {name}.log
  # 类型: str | null
  # 默认: null（自动在 logs/ 目录下创建 "swarm.log"）
  log_file: null

  # max_bytes: 单个日志文件的最大字节数
  # 超出此大小后自动触发 RotatingFileHandler 轮转，生成备份文件。
  # 值 0 表示不限制大小（不推荐，可能导致磁盘占满）。
  # 单位: 字节。下面的默认值 10 MB = 10 * 1024 * 1024。
  # 类型: int
  # 默认: 10485760（10 MB）
  max_bytes: 10485760

  # backup_count: 保留的轮转备份文件个数
  # 轮转时保留此数量的历史日志文件，最旧的将被删除。
  # 类型: int
  # 默认: 5
  backup_count: 5

  # json_mode: 是否使用 JSON 格式输出日志
  # true  — 每条日志输出为一行 JSON 对象，适合日志收集系统（ELK、Loki 等）
  # false — 使用人类可读的彩色 TEXT 格式（时间戳 + 级别 + 消息）
  # 类型: bool
  # 默认: false
  json_mode: false

  # console: 是否同时输出日志到控制台（stderr）
  # true  — 控制台和文件双输出
  # false — 仅输出到文件（静默模式，适合 daemon 运行）
  # 类型: bool
  # 默认: true
  console: true

# ──────────────────────────────────────────────────────────────────
# metrics 节 — 指标与性能监控配置
# ──────────────────────────────────────────────────────────────────
# 控制系统运行指标的存储和报告格式。
# 该节不直接对应现有 Python 模块，而是为未来扩展预留的标准接口。
# ──────────────────────────────────────────────────────────────────
metrics:
  # storage_path: 指标数据存储路径
  # 支持相对路径（相对于项目根目录）或绝对路径。
  # 格式: 建议使用 SQLite 数据库或 JSON Lines 文件。
  # 类型: str
  # 默认: "metrics/swarm_metrics.db"
  storage_path: "metrics/swarm_metrics.db"

  # report_format: 指标报告的输出格式
  # 可选值:
  #   "json" — JSON 格式，适合程序解析
  #   "table" — ASCII 表格，适合人类阅读
  #   "csv"  — CSV 格式，适合导入电子表格
  # 类型: str
  # 默认: "json"
  report_format: "json"

  # enabled_metrics: 启用的指标收集项列表
  # 每轮迭代中自动收集以下指标：
  #   round_duration  — 每轮耗时（秒）
  #   agent_success   — agent 任务成功数
  #   agent_failure   — agent 任务失败数
  #   heartbeat_lag   — 最大心跳延迟（秒）
  #   git_commits     — 本轮 git 提交数
  # 类型: list[str]
  # 默认: 收集所有可用指标
  enabled_metrics:
    - round_duration
    - agent_success
    - agent_failure
    - heartbeat_lag
    - git_commits
    - container_queue_length
    - pool_size

# ──────────────────────────────────────────────────────────────────
# git 节 — 版本控制与提交配置
# ──────────────────────────────────────────────────────────────────
# 控制 git 自动提交和推送行为。
# 对应 swarm_config.py DEFAULT_CONFIG["git"] 的所有字段。
# ──────────────────────────────────────────────────────────────────
git:
  # auto_push: 是否在每轮迭代后自动推送提交
  # true  — 每次进化循环完成后，自动执行 git push
  # false — 仅在本地提交，不自动推送（需手动 push）
  # 配置为 true 时，需确保已配置 SSH 密钥或 HTTPS 凭据。
  # 类型: bool
  # 默认: false
  auto_push: false

  # commit_prefix: 自动生成的 commit 消息前缀
  # 完整的 commit 消息格式为: "{prefix}: {摘要}"
  # 例如: "swarm-evolve: 更新 agent-2 处理策略"
  # 类型: str
  # 默认: "swarm-evolve"
  commit_prefix: "swarm-evolve"

  # push_retry: git push 的重试配置
  # 在网络不稳定的环境下，自动重试推送操作。
  # 类型: dict
  # 默认: 重试 3 次，间隔 5 秒
  push_retry:
    # max_attempts: 最大重试次数（包括首次尝试）
    # 类型: int，最小值: 1
    # 默认: 3
    max_attempts: 3

    # retry_delay_seconds: 每次重试间的等待时间（秒）
    # 类型: int，最小值: 1
    # 默认: 5
    retry_delay_seconds: 5

# ──────────────────────────────────────────────────────────────────
# delegation_incentive 节 — 成本激励机制
# ──────────────────────────────────────────────────────────────────
# 控制协调者 vs 子 Agent 的委托成本激励。
# coordinator_write_line_threshold: 协调者自写代码超此行数时发出警告
# delegate_success_bonus_tokens: 委托成功后获得的 token 预算奖励
# self_write_overflow_penalty: 超阈值的部分扣减的预算
# ──────────────────────────────────────────────────────────────────
delegation_incentive:
  # coordinator_write_line_threshold: 协调者单次自写代码行数阈值
  # 超过此值在日志中输出警告并扣减预算
  # 类型: int，最小值: 1
  # 默认: 50
  coordinator_write_line_threshold: 50

  # delegate_success_bonus_tokens: 委托成功奖励的 token 预算
  # 每成功委托一次，增加等量的 token 预算用于下次 API 调用
  # 类型: int，最小值: 0
  # 默认: 1000
  delegate_success_bonus_tokens: 1000

  # self_write_overflow_penalty: 超阈值扣减的预算
  # 协调者自写代码超过 coordinator_write_line_threshold 时，
  # 每超一行扣减此行数的预算
  # 类型: int，最小值: 0
  # 默认: 500
  self_write_overflow_penalty: 500
